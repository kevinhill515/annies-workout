<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Warm rounded background -->
  <rect width="64" height="64" rx="14" fill="#faf7f2"/>

  <!-- Soft violet glow -->
  <circle cx="32" cy="32" r="26" fill="#a78bfa" fill-opacity="0.18"/>

  <!-- A walking figure (steady, strong, in motion) -->
  <!-- Head -->
  <circle cx="32" cy="14" r="4" fill="#7c3aed"/>
  <!-- Torso -->
  <path d="M 28 19 L 36 19 L 36 36 Q 36 38 34 38 L 30 38 Q 28 38 28 36 Z" fill="#7c3aed"/>
  <!-- Arms swinging — one forward, one back -->
  <path d="M 28 22 L 22 30 L 22 33" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M 36 22 L 42 30 L 42 33" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Legs in mid-stride -->
  <path d="M 31 38 L 26 50 L 24 56" stroke="#7c3aed" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M 33 38 L 38 50 L 40 56" stroke="#7c3aed" stroke-width="3.5" stroke-linecap="round" fill="none"/>
</svg>
